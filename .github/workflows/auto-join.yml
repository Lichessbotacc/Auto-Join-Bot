name: Auto Join Lichess Team Tournaments

on:
  schedule:
    - cron: "40 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔴 EXTREM WICHTIG für Commit

jobs:
  auto-join:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run autojoin bot
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          python autojoin.py

      # ✅ DAS IST DER CACHE-SPEICHER
      - name: Commit checked tournaments cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add checked_tournaments.json
          git commit -m "Update checked tournaments cache" || echo "Nothing to commit"
          git push
